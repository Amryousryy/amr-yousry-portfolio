  <rect x="11" y="16" width="2" height="1" fill="#A78BFA" opacity="0.5"/>
  <rect x="11" y="19" width="2" height="1" fill="#A78BFA" opacity="0.5"/>
  
  <!-- Left wing (faster flap during transfer) -->
  <rect x="2" y="15" width="4" height="3" fill="#22D3EE" opacity="0.35"/>
  
