  <!-- Eye glow (maximum during transfer) -->
  <rect x="9" y="8" width="1" height="1" fill="#22D3EE" opacity="0.6"/>
  <rect x="12" y="8" width="1" height="1" fill="#22D3EE" opacity="0.6"/>
  <rect x="9" y="11" width="1" height="1" fill="#22D3EE" opacity="0.6"/>
