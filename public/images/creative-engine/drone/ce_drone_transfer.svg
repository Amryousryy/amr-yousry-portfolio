  <!-- Core glow (maximum during transfer) -->
  <rect x="10" y="16" width="1" height="1" fill="#A78BFA" opacity="0.7"/>
  <rect x="13" y="16" width="1" height="1" fill="#A78BFA" opacity="0.7"/>
  <rect x="10" y="19" width="1" height="1" fill="#A78BFA" opacity="0.7"/>
