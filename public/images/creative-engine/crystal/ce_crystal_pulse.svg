<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="48" height="48" shape-rendering="crispEdges">
  <!-- Memory Crystal — Pulse Animation (6 frames) -->
  <!-- Asset ID: ce_crystal_pulse_v01 -->
  <!-- Canvas: 16×16px native, 3× display (48×48px) -->
  <!-- Duration: 900ms, Loop: play once, Cooldown: 10s -->
  
  <style>
    @keyframes crystalPulse {
      0% { opacity: 1; filter: brightness(1); }
      25% { opacity: 1; filter: brightness(1.2); }
      50% { opacity: 1; filter: brightness(1.4); }
      75% { opacity: 1; filter: brightness(1.1); }
      100% { opacity: 1; filter: brightness(1); }
    }
    @keyframes glowExpand {
      0% { opacity: 0.3; }
      25% { opacity: 0.5; }
      50% { opacity: 0.7; }
      75% { opacity: 0.4; }
      100% { opacity: 0.3; }
    }
    @keyframes coreBrighten {
      0% { fill: #A78BFA"; opacity: 0.6; }
      25% { fill: #22D3EE"; opacity: 0.8; }
      50% { fill: #22D3EE"; opacity: 1; }
      75% { fill: #A78BFA"; opacity: 0.7; }
      100% { fill: #A78BFA"; opacity: 0.6; }
    }
    .crystal-body { animation: crystalPulse 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .crystal-glow { animation: glowExpand 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  </style>

  <!-- Expanded glow (pulse peak — 2px border) -->
