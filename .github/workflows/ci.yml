# CI Quality Gate
#
# Build is blocking — the workflow fails if the build fails.
# Unit tests (schema, regression) block — pure function tests, no dependencies.
# Readiness, auth rate-limit, insight engine, and settings validation unit tests block.
# Public contract tests block — verify public endpoints and security headers.
# Lint is blocking — ESLint errors fail CI.
#
# Integration tests (API, DB persistence) require a MongoDB service container.
# They run only when the TEST_INTEGRATION env var is set (main branch / manual trigger).
#
# E2E tests (Playwright) run against a real dev server with MongoDB Atlas.
# Regression: ADMIN-PAGINATION-001 — pagination E2E suite is mandatory.
#
# Does not expose secrets.
# Does not mutate production data.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────
  # Unit + Lint + Build (always run)
  # ──────────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (blocking)
        run: npm run build

      - name: Whitespace check (blocking)
        run: git diff --check

      - name: Unit tests — schema validation (blocking)
        run: npm run test:unit

      - name: Unit tests — project validation (blocking)
        run: npm run qa:project-validation-unit

      - name: Readiness unit tests (blocking)
        run: npm run qa:readiness-unit

      - name: Auth rate-limit unit tests (blocking)
        run: npm run qa:auth-rate-limit-unit

      - name: Insight engine unit tests (blocking)
        run: npm run qa:insight-engine-unit

      - name: Settings validation unit tests (blocking)
        run: npm run qa:settings-validation-unit

      - name: Homepage content unit tests (blocking)
        run: npm run qa:public-homepage-content-unit

      - name: Contact content unit tests (blocking)
        run: npm run qa:public-contact-content-unit

      - name: Public contract smoke tests (blocking)
        run: npm run qa:public-contract
        env:
          PORT: 3001
          HOSTNAME: localhost
          SERVER_TIMEOUT: 30000
          QA_TIMEOUT: 60000

      - name: Lint (blocking)
        run: npm run lint

  # ──────────────────────────────────────────────────────
  # Integration + Regression (need MongoDB)
  # ──────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          MONGODB_URI: mongodb://localhost:27017/portfolio-test
          NEXTAUTH_SECRET: ci-test-secret-not-real
          NEXTAUTH_URL: http://localhost:3000

      - name: Regression tests — save bug (blocking)
        run: npm run test:regression

      - name: Integration tests — API CRUD (blocking)
        run: npm run test:integration
        env:
          TEST_BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: pkill -f "next dev" || true

  # ──────────────────────────────────────────────────────
  # E2E — Playwright (ADMIN-PAGINATION-001 regression gate)
  # ──────────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          PORT: "3000"

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests (blocking)
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
