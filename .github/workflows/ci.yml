# CI Quality Gate
#
# Build is blocking — the workflow fails if the build fails.
# Readiness unit tests block — pure function tests with no dependencies.
# Public contract tests block — verify public endpoints and security headers.
# Lint is report-only temporarily due to existing lint debt.
# After lint debt cleanup (Phase 4), remove "|| true" to make lint blocking.
#
# Does not require production environment variables.
# Does not expose secrets.
# Does not require .env.local.
# Does not mutate production data.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (blocking)
        run: npm run build

      - name: Whitespace check (blocking)
        run: git diff --check

      - name: Readiness unit tests (blocking)
        run: npm run qa:readiness-unit

      - name: Public contract smoke tests (blocking)
        run: npm run qa:public-contract
        env:
          PORT: 3001
          HOSTNAME: localhost
          SERVER_TIMEOUT: 30000
          QA_TIMEOUT: 60000

      - name: Lint (blocking)
        run: npm run lint
